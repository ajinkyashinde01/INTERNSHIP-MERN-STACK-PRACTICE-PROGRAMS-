<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        h2 {
            text-align: center;
        }

        .box {
            width: 300px;
            margin: 100px auto;
            background: rgb(13, 3, 52);
            color: white;
            padding: 20px;
            border-radius: 15px;
        }

        div {
            border-bottom: 1px solid white;
            margin: 20px 0;
            padding: 10px;
        }

        input {
            background: none;
            border: none;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>SIGN IN</h2>

        <div>
            <i class="fa-solid fa-user"></i>
        </div>

        <div>
            <i class="fa-solid fa-envelope"></i>
        </div>

        <div>
            <i class="fa-solid fa-phone"></i>
        </div>

        <button>Sign In</button>
    </div>

</body>

</html>
