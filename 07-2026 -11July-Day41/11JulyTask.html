<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="board">
    <!-- Row 8 -->
    <div class="square dark"><span class="piece">♜</span></div>
    <div class="square light"><span class="piece">♞</span></div>
    <div class="square dark"><span class="piece">♝</span></div>
    <div class="square light"><span class="piece">♛</span></div>
    <div class="square dark"><span class="piece">♚</span></div>
    <div class="square light"><span class="piece">♝</span></div>
    <div class="square dark"><span class="piece">♞</span></div>
    <div class="square light"><span class="piece">♜</span></div>

    <!-- Row 7 -->
    <div class="square light"><span class="piece">♟</span></div>
    <div class="square dark"><span class="piece">♟</span></div>
    <div class="square light"><span class="piece">♟</span></div>
    <div class="square dark"><span class="piece">♟</span></div>
    <div class="square light"><span class="piece">♟</span></div>
    <div class="square dark"><span class="piece">♟</span></div>
    <div class="square light"><span class="piece">♟</span></div>
    <div class="square dark"><span class="piece">♟</span></div>

    <!-- Row 6 -->
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>

    <!-- Row 5 -->
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>

    <!-- Row 4 -->
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>

    <!-- Row 3 -->
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>

    <!-- Row 2 -->
    <div class="square dark"><span class="piece">♙</span></div>
    <div class="square light"><span class="piece">♙</span></div>
    <div class="square dark"><span class="piece">♙</span></div>
    <div class="square light"><span class="piece">♙</span></div>
    <div class="square dark"><span class="piece">♙</span></div>
    <div class="square light"><span class="piece">♙</span></div>
    <div class="square dark"><span class="piece">♙</span></div>
    <div class="square light"><span class="piece">♙</span></div>

    <!-- Row 1 -->
    <div class="square light"><span class="piece">♖</span></div>
    <div class="square dark"><span class="piece">♘</span></div>
    <div class="square light"><span class="piece">♗</span></div>
    <div class="square dark"><span class="piece">♕</span></div>
    <div class="square light"><span class="piece">♔</span></div>
    <div class="square dark"><span class="piece">♗</span></div>
    <div class="square light"><span class="piece">♘</span></div>
    <div class="square dark"><span class="piece">♖</span></div>
  </div>
</body>
</html>
