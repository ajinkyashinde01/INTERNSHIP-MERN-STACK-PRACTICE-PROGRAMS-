<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.hero{
    min-height:100vh;
    background:
    linear-gradient(to bottom,rgba(0,0,0,.75),rgba(0,0,0,.85)),
    url(https://tse2.mm.bing.net/th/id/OIP.4a4Etv5J1ytiHoelCBYRsAHaEK?pid=Api&h=220&P=0);
    background-size:cover;
    background-position:center;
    position:relative;
}

nav{
    width:85%;
    margin:auto;
    padding:25px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:42px;
    font-weight:800;
    color:#ff1e1e;
}

.actions{
    display:flex;
    gap:12px;
}

.lang{
    background:rgba(0,0,0,.4);
    color:white;
    border:1px solid #666;
    padding:10px 18px;
    border-radius:6px;
}

.signin{
    background:#ff1e1e;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

.content{
    max-width:900px;
    margin:auto;
    text-align:center;
    padding-top:140px;
}

.content h1{
    font-size:3.5rem;
    line-height:1.15;
    font-weight:600;
}

.content h3{
    margin-top:20px;
    font-size:1.5rem;
    font-weight:500;
}

.content p{
    margin-top:25px;
    font-size:1.1rem;
}

.form{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.form input{
    width:420px;
    max-width:90%;
    padding:18px;
    font-size:18px;
    background:rgba(0,0,0,.5);
    border:1px solid #666;
    color:white;
    border-radius:6px;
}

.form button{
    background:#ff1e1e;
    color:white;
    border:none;
    padding:18px 32px;
    font-size:22px;
    font-weight:600;
    border-radius:6px;
    cursor:pointer;
}

.bottom-glow{
    position:absolute;
    bottom:0;
    width:100%;
    height:6px;
    background:#ff1e1e;
    box-shadow:0 0 30px #ff1e1e;
}

@media(max-width:768px){

.content h1{
    font-size:2.8rem;
}

.content{
    padding-top:100px;
}

.form{
    flex-direction:column;
    align-items:center;
}

.form button{
    width:420px;
    max-width:90%;
}
}
</style>
</head>
<body>

<section class="hero">

<nav>
    <div class="logo">NETFLIX</div>

    <div class="actions">
        <button class="lang">English</button>
        <button class="signin">Sign In</button>
    </div>
</nav>

<div class="content">
    <h1>Unlimited movies,<br>shows and entertainment</h1>

    <h3>Plans start from ₹149. Cancel anytime.</h3>

    <p>Enter your email to start watching instantly.</p>

    <div class="form">
        <input type="email" placeholder="Email Address">
        <button>Get Started ></button>
    </div>
</div>

<div class="bottom-glow"></div>

</section>

</body>
</html>
