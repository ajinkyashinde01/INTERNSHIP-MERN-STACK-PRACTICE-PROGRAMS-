<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Form 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
            text-align: center;
            width: 350px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 95%;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #timer {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }

        #message {
            color: green;
            font-weight: bold;
            margin-top: 15px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login Form</h2>

    <input type="text" id="user" placeholder="Enter Your Username">
    <input type="password" id="pass" placeholder="Enter Your Password">
    <button onclick="getClick()">LOGIN</button>

    <p id="timer"></p>
    <p id="message"></p>
</div>

<script>
    let name = "Admin";
    let pass = "Admin@123";
    let otp;
    let timeLeft;
    let timer;

    function startTimer() {
        timeLeft = 30;

        timer = setInterval(() => {
            document.getElementById("timer").innerText =
                "OTP Valid for: " + timeLeft + " sec";

            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(timer);
                document.getElementById("timer").innerText = "OTP Expired!";
            }
        }, 1000);
    }

    function getClick() {
        let username = document.getElementById("user").value;
        let password = document.getElementById("pass").value;

        if (username === name && password === pass) {
            document.getElementById("message").innerText = "Login Successful";
        } 
        else {
            alert("Wrong Password");

            otp = Math.floor(1000 + Math.random() * 9000);
            alert("Your OTP is: " + otp);

            startTimer();

            let userOtp = prompt("Enter OTP within 30 seconds:");

            if (parseInt(userOtp) === otp && timeLeft > 0) {
                clearInterval(timer);

                alert("OTP Verified");

                document.getElementById("message").innerText = "Login Successful";
            } 
            else {
                clearInterval(timer);
                document.getElementById("message").innerText = "Wrong OTP or OTP Expired";
            }
        }
    }
</script>

</body>
</html>
