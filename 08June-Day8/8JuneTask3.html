<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Print 1 to 10 Numbers</h1>
    <script>
        var a = 1;
        while(a<=10){
            document.write( a,"\n")
            a++;
        }
    </script>
    
</body>
</html>
