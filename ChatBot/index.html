<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Chatbot</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="chat-wrapper" aria-label="Chatbot">
        <header class="chat-header">
            <h1>AI CHATBOT</h1>
            <p class="chat-subtitle">TYPE YOUR MESSAGE AND PRESS ENTER</p>
        </header>

        <section class="chat-messages" id="chatMessages" aria-live="polite"></section>

        <form class="chat-input" id="chatForm">
            <label class="sr-only" for="chatInput">Message</label>
            <input type="text" id="chatInput" name="message" placeholder="Write your message..." autocomplete="off" />
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </main>
    <script src="key.js"></script>
    <script src="chatbot.js"></script>
</body>

</html>
